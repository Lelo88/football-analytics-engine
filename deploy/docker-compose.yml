services:
  postgres:
    image: postgres:16
    container_name: football-analytics-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - football_analytics

  metabase:
    image: metabase/metabase:latest
    container_name: football-analytics-metabase
    restart: unless-stopped
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${POSTGRES_DB}
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER}
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_DB_HOST: postgres
    ports:
      - "${METABASE_PORT}:3000"
    depends_on:
      - postgres
    networks:
      - football_analytics

networks:
  football_analytics:
    driver: bridge

volumes:
  postgres_data: