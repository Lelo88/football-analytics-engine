name: CI

on:
  push:
    branches:
      - main
      - develop

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Run CI target
        run: make ci

      - name: Cleanup Docker stack
        if: always()
        run: make db-down